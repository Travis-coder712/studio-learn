<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>AURES</title>
    <script>
      // GitHub Pages SPA redirect
      // Converts path to query string so index.html can handle routing
      // Skip redirect for standalone sub-apps (e.g. /aures-db/country/)
      var l = window.location;
      if (l.pathname.indexOf('/aures-db/country') === 0) {
        // Let the standalone PWA handle its own routing
        l.replace(l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') + '/aures-db/country/');
      } else {
        var pathSegmentsToKeep = 1; // Keep /aures-db/ segment
        l.replace(
          l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
          l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
          l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
          (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
          l.hash
        );
      }
    </script>
  </head>
  <body>
  </body>
</html>
